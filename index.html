<!DOCTYPE html>
<html>
<head>
    <title>Nelly's Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
     .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 5px; }
        h2 { color: #667eea; margin-top: 0; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #eee;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus { border-color: #667eea; outline: none; }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #5a6fd8; }
        #message { margin-top: 15px; font-weight: bold; min-height: 20px; }
     .dashboard h1 { color: #667eea; }
     .logout { background: #e74c3c; }
     .logout:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h1>Welcome to</h1>
        <h2>Nelly's Website</h2>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Enter username" required>
            <input type="password" id="password" placeholder="Enter password" required>
            <button type="submit">Login</button>
        </form>
        <p id="message"></p>
        <p style="font-size: 12px; color: #999; margin-top: 20px;">
            Try: nelly/queen or admin/1234 or bro/happy
        </p>
    </div>

    <script>
        const users = {
            'admin': '1234',
            'user': 'password',
            'bro': 'happy',
            'nelly': 'queen'
        };

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            let user = document.getElementById('username').value;
            let pass = document.getElementById('password').value;
            let message = document.getElementById('message');
            
            if (users[user] === pass) {
                message.style.color = 'green';
                message.innerText = 'Login successful! Loading...';
                
                setTimeout(function() {
                    document.body.innerHTML = `
                        <div class="box dashboard">
                            <h1>Dashboard</h1>
                            <h2>Welcome back, ${user}! 🎉</h2>
                            <p>You successfully logged into Nelly's Website.</p>
                            <p>This is your personal dashboard, Queen 👑</p>
                            <button class="logout" onclick="location.reload()">Logout</button>
                        </div>
                    `;
                }, 1000);
                
            } else {
                message.style.color = 'red';
                message.innerText = 'Wrong username or password!';
            }
        });
    </script>
</body>
</html>
